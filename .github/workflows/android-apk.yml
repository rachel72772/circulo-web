name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle -p android assembleDebug --stacktrace

      - name: Prepare named APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Circulo.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Circulo-APK
          path: Circulo.apk
          if-no-files-found: error

      - name: Publish stable download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete apk-latest --cleanup-tag --yes || true
          gh release create apk-latest Circulo.apk --title "Círculo APK" --notes "APK Android compilada automáticamente desde la rama main."
